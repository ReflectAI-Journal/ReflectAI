services:
  - type: web
    name: reflectai-backend
    env: node
    buildCommand: ./build.sh
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true 